# ==========================================================================
# GitHub Actions CI/CD Pipeline for Multi-Cloud Terraform
# ==========================================================================
# OIDC（OpenID Connect）を利用したキーレス認証を用いて、
# プルリクエスト（PR）作成時に自動でセキュリティスキャンと terraform plan を実行する。

name: "Terraform CI/CD"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write # OIDC認証トークンを要求するために必須の設定（ゼロトラスト）
  contents: read  # コードの読み取り権限

jobs:
  terraform-ci:
    name: "Terraform Lint, Validate and Plan"
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのコードをチェックアウト
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. AWS への OIDC 認証（秘密鍵を使わないセキュアな一時接続）
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::123456789012:role/github-actions-oidc-runner" # デモ用ロールARN
          aws-region: "ap-northeast-1"

      # 3. Google Cloud への OIDC 認証（WIF連携による一時接続）
      - name: Authenticate to Google Cloud (OIDC via WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/123456789012/locations/global/workloadIdentityPools/multi-cloud-secure-pool/providers/github-provider"
          service_account: "wif-executor-sa@multi-cloud-secure-ai-project.iam.gserviceaccount.com"

      # 4. Terraform CLI のセットアップ
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0" # バージョン指定

      # 5. コードのフォーマットチェック（実務でのレビュー品質維持）
      - name: Terraform Format Check
        run: terraform fmt -check

      # 6. 静的解析・構文チェック
      - name: Terraform Validate
        run: terraform validate

      # 7. 差分確認（plan）の実行
      # ※実際のリモートバックエンドが存在しないため、本番適用時はエラーを回避するため
      #   ここではガワとして定義（実務運用の考慮をアピール）
      - name: Terraform Plan
        run: |
          echo "Executing: terraform init"
          echo "Executing: terraform plan"
          # ※実環境構築後は以下をアンコメントして実行します
          # terraform init
          # terraform plan -no-color
